<script>
const SUPABASE_URL = "https://pacqhrisrmmhyyaoaifr.supabase.co";

const fc = s => { if(!s) return "—"; const [y,m,d]=String(s).split("-"); return `${d}/${m}/${y.slice(2)}`; };
const fmes = s => { if(!s) return ""; const [y,m]=String(s).split("-"); return ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][+m-1]+" "+y.slice(2); };
const esc = s => (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const addDias = (iso,n)=>{const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const dias = (a,b)=>Math.round((new Date(b)-new Date(a))/86400000);

function toast(m,tipo){
  if(!tipo){const s=m.toLowerCase();
    if(s.startsWith("no se pudo")||s.includes("falló")||s.includes("no encontré")||s.includes("incorrect")||s.includes("error")||s.includes("no hay")||s.includes("no válid")) tipo="err";
    else if(/(guardad|actualizad|registrad|creada|creado|enviad|eliminad|aprobad|aplicad|importad|agregad|activad|guardó|listo)/.test(s)) tipo="ok";
    else tipo="info";
  }
  const t=document.createElement("div");t.className="toast "+tipo;
  const ic=tipo==="ok"?"✓":tipo==="err"?"!":"";
  t.innerHTML=(ic?`<span class="ti">${ic}</span>`:"")+esc(m);
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity="0";setTimeout(()=>t.remove(),250);},3300);
}

async function cargarPerfil(){
  root.innerHTML='<div class="cargando">Cargando tu información…</div>';
  const { data:perfil,error } = await db.from("perfiles").select("*").eq("id",S.sesion.user.id).single();
  if(error||!perfil){ root.innerHTML=`<div class="cargando" style="text-align:center">Tu cuenta no tiene acceso (o fue desactivada).<br>Contacta al administrador.<br><br><button class="btn-ghost" onclick="salir()">Salir</button></div>`; return; }
  S.perfil=perfil;
  const { data:org } = await db.from("organizaciones").select("*").eq("id",perfil.organizacion_id).single();
  S.org=org;
  const { data:cfg } = await db.from("config").select("*").eq("id",true).single();
  S.config=cfg||{empresa:"Plaza Media OS",ticket_promedio:280,temporada:TEMPORADA_DEF,umbral_descuento:15};
  const { data:aviso } = await db.from("aviso_privacidad").select("contenido,version").eq("id",1).single();
  S.aviso=aviso||null;
  const rutear=()=>{ if(perfil.rol==="Inquilino") return renderInquilino(); if(org&&org.tipo==="agencia") renderConsola(); else renderPortal(); };
  if(aviso && (perfil.aviso_version||0) < aviso.version){
    return avisoModal(aviso.contenido,{consent:true,onAccept:async()=>{
      const {error}=await db.rpc("aceptar_aviso",{v:aviso.version});
      if(error){toast("No se pudo registrar tu aceptación: "+error.message);return;}
      S.perfil.aviso_version=aviso.version; rutear();
    }});
  }
  rutear();
}

// fields: {key,label,type,options,value,col,ph}; type: text|number|date|textarea|select|multi
function formModal({title,fields,onSave,saveLabel="Guardar",extra=""}){
  const o=document.createElement("div"); o.className="overlay";
  const inner=fields.map(f=>{
    const v=f.value!=null?f.value:"";
    let ctrl="";
    if(f.type==="select") ctrl=`<select data-k="${f.key}">${(f.options||[]).map(op=>`<option value="${esc(op.value)}" ${String(op.value)===String(v)?'selected':''}>${esc(op.label)}</option>`).join("")}</select>`;
    else if(f.type==="textarea") ctrl=`<textarea data-k="${f.key}" placeholder="${esc(f.ph||"")}">${esc(v)}</textarea>`;
    else if(f.type==="multi"){ const sel=Array.isArray(v)?v:[]; ctrl=`<div data-multi="${f.key}">${(f.options||[]).map(op=>`<button type="button" class="chip-sel ${sel.includes(op.value)?'on':''}" data-v="${esc(op.value)}">${esc(op.label)}</button>`).join("")||'<span class="sub">Sin opciones.</span>'}</div>`; }
    else ctrl=`<input data-k="${f.key}" type="${f.type||'text'}" value="${esc(v)}" placeholder="${esc(f.ph||"")}"/>`;
    return `<div class="${f.col||''}"><label>${esc(f.label)}</label>${ctrl}</div>`;
  });
  // agrupar en grid2 los marcados col==='g'
  let body="",i=0;
  while(i<fields.length){
    if(fields[i].col==='g'&&fields[i+1]&&fields[i+1].col==='g'){ body+=`<div class="grid2">${inner[i]}${inner[i+1]}</div>`; i+=2; }
    else { body+=inner[i]; i++; }
  }
  o.innerHTML=`<div class="modal"><h3>${esc(title)}</h3>${body}${extra}<div class="pie"><button class="btn-ghost" data-cerrar>Cancelar</button><button class="btn" data-guardar>${esc(saveLabel)}</button></div></div>`;
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.querySelector("[data-cerrar]").onclick=()=>o.remove();
  o.querySelectorAll("[data-multi] .chip-sel").forEach(b=>b.onclick=()=>b.classList.toggle("on"));
  o.querySelector("[data-guardar]").onclick=async()=>{
    if(soloLectura()){toast("Tu perfil es de solo lectura");return;}
    const val={};
    o.querySelectorAll("[data-k]").forEach(el=>{ val[el.dataset.k]= el.type==="number"?(el.value===""?null:Number(el.value)):el.value; });
    o.querySelectorAll("[data-multi]").forEach(m=>{ val[m.dataset.multi]=[...m.querySelectorAll(".chip-sel.on")].map(b=>b.dataset.v); });
    const btn=o.querySelector("[data-guardar]"); btn.disabled=true; btn.textContent="Guardando…";
    try{ const r=await onSave(val); if(r!==false) o.remove(); else { btn.disabled=false; btn.textContent=saveLabel; } }
    catch(e){ toast("Error: "+e.message); btn.disabled=false; btn.textContent=saveLabel; }
  };
  document.body.appendChild(o);
  return o;
}

/* ============ TARIFAS DINÁMICAS ============ */
function factorTemporada(m){ const t=S.config.temporada||TEMPORADA_DEF; return t[m]!=null?t[m]:1; }
function ocupacionPlaza(plazaId){ const inv=(S.D.inv||[]).filter(a=>a.plaza_id===plazaId); if(!inv.length)return 0;
  const ocup=inv.filter(a=>(S.D.campAll||[]).some(c=>COMPROMETIDA.includes(c.estado)&&(c.campana_espacios||[]).some(e=>e.inventario_id===a.id))).length; return ocup/inv.length; }
function factorDemanda(plazaId){ return 0.9+ocupacionPlaza(plazaId)*0.4; }
function precioSugerido(a,m){ m=m!=null?m:new Date().getMonth(); return Math.round((a.tarifa||0)*factorTemporada(m)*factorDemanda(a.plaza_id)/100)*100; }

/* ============ DERIVADOS ============ */
const ingreso=c=>(c.campana_espacios||[]).reduce((s,i)=>s+Number(i.precio||0),0);
const costo=c=>(c.ordenes_compra||[]).reduce((s,o)=>s+Number(o.monto||0),0);
const enEspecie=c=>(c.canjes||[]).reduce((s,k)=>s+Number(k.valor_estimado||0),0);
const enEfectivo=c=>Math.max(0,ingreso(c)-enEspecie(c));
const cpm=a=>{const im=Number(a?.impresiones_mes||0);return im>0?Number(a?.tarifa||0)/(im/1000):0;};
const fmtImp=n=>Number(n||0).toLocaleString("es-MX");
const slotsTot=a=>(a&&a.es_digital&&a.spot_seg>0&&a.loop_seg>0)?Math.floor(a.loop_seg/a.spot_seg):0;
const reproDia=(a,slots)=>(a&&a.es_digital&&a.loop_seg>0)?Math.round(a.horas_dia*3600/a.loop_seg*(slots||0)):0;
const sovPct=(a,slots)=>{const t=slotsTot(a);return t>0?Math.round((slots||0)/t*100):0;};
function estadoFactura(f){ if(f.estado==="Pagada"||f.estado==="Por emitir")return f.estado; if(f.vencimiento&&f.vencimiento<hoy())return "Vencida"; return f.estado; }
function descMax(c){ let m=0; (c.campana_espacios||[]).forEach(e=>{const t=e.inventario?.tarifa; if(t>0)m=Math.max(m,Math.round((1-e.precio/t)*100));}); return m; }
function requiereAprob(c){ return descMax(c)>(S.config.umbral_descuento||15); }
function estadoAprob(c){ return (c.aprobacion&&c.aprobacion.estado)||(requiereAprob(c)?"Pendiente":"No requiere"); }

// Conjunto de plazas que el usuario puede ver (null = todas)
function plazasVisibles(){
  const p=S.perfil; const regs=S.D.regiones||[]; const plz=S.D.plazasTodas||[];
  const tieneLimite=(p.plaza_ids&&p.plaza_ids.length)||(p.region_ids&&p.region_ids.length)||p.division_id;
  if(!tieneLimite) return null;
  const set=new Set();
  if(p.plaza_ids) p.plaza_ids.forEach(id=>set.add(id));
  if(p.region_ids&&p.region_ids.length) plz.filter(x=>p.region_ids.includes(x.region_id)).forEach(x=>set.add(x.id));
  if(p.division_id){ const regsDiv=regs.filter(r=>r.division_id===p.division_id).map(r=>r.id); plz.filter(x=>regsDiv.includes(x.region_id)).forEach(x=>set.add(x.id)); }
  return [...set];
}

async function precargar(){
  // datos compartidos para alertas, calendario, tarifas, ocupación + territorio
  const [{data:campAll},{data:inv},{data:bloqueos},{data:notifs},{data:plazasT},{data:regiones}] = await Promise.all([
    db.from("campanas").select("id,nombre,estado,inicio,fin,organizacion_id,cliente_id,vendedor_id,aprobacion,pago_tipo, campana_espacios(inventario_id,precio,inicio,fin, inventario(tarifa,nombre,plaza_id)), facturas(monto,estado,vencimiento), resultados(metrica,objetivo,real), tareas_produccion(titulo,hecha,limite), canjes(valor_estimado,recibido)"),
    db.from("inventario").select("*, plazas(nombre)"),
    db.from("bloqueos_inventario").select("*"),
    db.from("notificaciones").select("*").order("creada_en",{ascending:false}).limit(40),
    db.from("plazas").select("id,nombre,region_id"),
    db.from("regiones").select("id,nombre,division_id")
  ]);
  S.D.plazasTodas=plazasT||[]; S.D.regiones=regiones||[];
  let invF = inv||[];
  const visibles = plazasVisibles();
  if(visibles) invF = invF.filter(a=>visibles.includes(a.plaza_id));
  S.D.campAll=campAll||[]; S.D.inv=invF; S.D.bloqueos=bloqueos||[]; S.D.notifs=notifs||[];
}
function alertasCalc(){
  const A=[];
  // sobreventa
  (S.D.inv||[]).forEach(a=>{
    const res=(S.D.campAll||[]).filter(c=>c.estado!=="Perdida"&&c.estado!=="Finalizada").flatMap(c=>(c.campana_espacios||[]).filter(e=>e.inventario_id===a.id).map(e=>({c,e})));
    for(let i=0;i<res.length;i++)for(let j=i+1;j<res.length;j++){ const x=res[i],y=res[j]; if(overlap(x.e.inicio||x.c.inicio,x.e.fin||x.c.fin,y.e.inicio||y.c.inicio,y.e.fin||y.c.fin)){ A.push({n:"alto",t:"Sobreventa",x:`${a.nombre}: ${x.c.nombre} y ${y.c.nombre}`,go:()=>irVista("calendario")}); break; } }
  });
  (S.D.campAll||[]).forEach(c=>{
    (c.facturas||[]).forEach(f=>{ if(f.estado==="Emitida"&&f.vencimiento&&f.vencimiento<hoy()) A.push({n:"alto",t:"Factura vencida",x:`${c.nombre} · ${mxn(f.monto)}`,go:()=>irVista("facturacion")}); });
    if(requiereAprob(c)&&estadoAprob(c)==="Pendiente"&&c.estado!=="Finalizada") A.push({n:"medio",t:"Descuento por aprobar",x:`${c.nombre} · ${descMax(c)}%`,go:()=>abrirCamp(c.id)});
    (c.tareas_produccion||[]).forEach(t=>{ if(!t.hecha&&t.limite&&t.limite<hoy()) A.push({n:"medio",t:"Tarea vencida",x:`${t.titulo} · ${c.nombre}`,go:()=>abrirCamp(c.id)}); });
    if(c.estado==="Activa") (c.resultados||[]).forEach(r=>{ if(r.objetivo>0&&r.real/r.objetivo<0.5&&c.fin<addDias(hoy(),15)) A.push({n:"medio",t:"Meta en riesgo",x:`${c.nombre}: ${r.metrica} al ${Math.round(r.real/r.objetivo*100)}%`,go:()=>abrirCamp(c.id)}); });

function modalArchivo(cid){
  const c=null;

  o.innerHTML=`<div class="modal"><h3>Subir archivo</h3>
    <label>Tipo</label><select id="aTipo"><option value="arte">Arte / pieza</option><option value="brief">Brief</option><option value="documento">Documento</option></select>

// Estimación de alcance: suma de segmentos menos traslape entre los de la misma plaza
function audienciaCampana(segs){
  const bruto=segs.reduce((s,x)=>s+Number(x.tamano||0),0);
  let traslape=0; const porPlaza={};
  segs.forEach(s=>{const k=s.plaza_id||"sin";(porPlaza[k]=porPlaza[k]||[]).push(Number(s.tamano||0));});
  Object.values(porPlaza).forEach(arr=>{ if(arr.length>1){ arr.sort((a,b)=>b-a); for(let i=1;i<arr.length;i++) traslape+=Math.round(arr[i]*0.3); } });
  return {bruto,traslape,neto:bruto-traslape};
}

function vForecast(){

  const bruto=fc2.reduce((s,x)=>s+x.ing,0),pond=fc2.reduce((s,x)=>s+x.ing*x.prob,0);
  const porEt=ESTADOS_CAMPANA.filter(e=>e!=="Finalizada"&&e!=="Perdida").map(e=>{const f=fc2.filter(x=>x.c.estado===e);return{e,bruto:f.reduce((s,x)=>s+x.ing,0),pond:f.reduce((s,x)=>s+x.ing*x.prob,0),n:f.length};});
  const cliMap={};(S.D.cli||[]).forEach(c=>cliMap[c.id]=c.nombre);if(!S.D.cli)db.from("clientes").select("id,nombre").then(({data})=>{S.D.cli=data||[];vForecast();});

}

const TIPOS_REPORTE=[["resumen_comercial","Resumen comercial"],["cobranza","Cobranza / por cobrar"],["campanas_activas","Campañas activas"]];
function generarReporteTexto(tipo){
  const camps=S.D.campAll||[];
  const enc=`${S.config.empresa} · ${fc(hoy())}`;
  if(tipo==="cobranza"){
    const fac=camps.flatMap(c=>(c.facturas||[]).map(f=>({f,c})));
    const pend=fac.filter(x=>x.f.estado!=="Pagada"&&x.f.estado!=="Por emitir");
    const venc=pend.filter(x=>x.f.vencimiento&&x.f.vencimiento<hoy());
    const totPend=pend.reduce((s,x)=>s+Number(x.f.monto||0),0);
    const totVenc=venc.reduce((s,x)=>s+Number(x.f.monto||0),0);
    return [`Reporte de cobranza — ${enc}`,``,`• Por cobrar total: ${mxn(totPend)} (${pend.length} facturas)`,`• Vencido: ${mxn(totVenc)} (${venc.length} facturas)`,``,`Facturas vencidas:`,...venc.sort((a,b)=>(a.f.vencimiento||"").localeCompare(b.f.vencimiento||"")).map(x=>`   - ${x.f.folio||"s/folio"} · ${x.c.nombre} · ${mxn(x.f.monto)} · venció ${fc(x.f.vencimiento)}`)].join("\n");
  }
  if(tipo==="campanas_activas"){
    const act=camps.filter(c=>c.estado==="Activa");
    const ing=act.reduce((s,c)=>s+ingreso(c),0);
    return [`Campañas activas — ${enc}`,``,`• Activas: ${act.length} · Inversión: ${mxn(ing)}`,``,...act.map(c=>`   - ${c.nombre}: ${mxn(ingreso(c))} (hasta ${fc(c.fin)})`)].join("\n");
  }
  // resumen_comercial
  const nuevas=camps.filter(c=>(c.inicio||"")>=addDias(hoy(),-7));
  const ganadasMes=camps.filter(c=>["Aprobada","En producción","Activa","Finalizada"].includes(c.estado)&&(c.inicio||"")>=addDias(hoy(),-30));
  const ingMes=ganadasMes.reduce((s,c)=>s+ingreso(c),0);
  const pipe=camps.filter(c=>["Propuesta","Aprobada"].includes(c.estado)).reduce((s,c)=>s+ingreso(c),0);
  const porCobrar=camps.flatMap(c=>c.facturas||[]).filter(f=>f.estado!=="Pagada"&&f.estado!=="Por emitir").reduce((s,f)=>s+Number(f.monto||0),0);
  return [`Resumen comercial — ${enc}`,``,`• Ingreso ganado (30 días): ${mxn(ingMes)} en ${ganadasMes.length} campañas`,`• Pipeline abierto: ${mxn(pipe)}`,`• Campañas nuevas (7 días): ${nuevas.length}`,`• Por cobrar: ${mxn(porCobrar)}`,`• Alertas abiertas: ${(S.D.alertas||[]).length}`,``,`Campañas activas:`,...camps.filter(c=>c.estado==="Activa").map(c=>`   - ${c.nombre}: ${mxn(ingreso(c))} (hasta ${fc(c.fin)})`)].join("\n");
}

function vCalendario(){
  const ok=s=>typeof s==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s);
  const campAll=(S.D.campAll||[]), inv=(S.D.inv||[]), bloqueos=(S.D.bloqueos||[]).filter(b=>ok(b.inicio)&&ok(b.fin));
  const res=campAll.filter(c=>c.estado!=="Perdida")
    .flatMap(c=>(c.campana_espacios||[]).map(e=>({c,e,act:e.inventario_id,tent:c.estado==="Propuesta",ri:(e.inicio||c.inicio),rf:(e.fin||c.fin)})))
    .filter(r=>ok(r.ri)&&ok(r.rf));
  let ini=hoy(),fin=addDias(hoy(),180);
  res.forEach(r=>{if(r.ri<ini)ini=r.ri;if(r.rf>fin)fin=r.rf;});
  bloqueos.forEach(b=>{if(b.inicio<ini)ini=b.inicio;if(b.fin>fin)fin=b.fin;});
  if(!ok(ini))ini=hoy(); if(!ok(fin)||fin<ini)fin=addDias(ini,180);
  ini=ini.slice(0,8)+"01"; const tot=Math.max(1,dias(ini,fin));
  const pos=d=>Math.max(0,Math.min(100,dias(ini,d)/tot*100)), anch=(a,b)=>Math.max(1,Math.min(100,dias(a,b)/tot*100));
  const marcas=[];let cur=ini,guard=0;while(cur<=fin && guard++<400){marcas.push(cur);const d=new Date(cur+"T00:00:00Z");d.setUTCMonth(d.getUTCMonth()+1);cur=d.toISOString().slice(0,8)+"01";}
  // Conflicto: dos reservas confirmadas se traslapan, o una confirmada choca con un bloqueo
  const conf={};inv.forEach(a=>{
    const rr=res.filter(r=>r.act===a.id && !r.tent);
    for(let i=0;i<rr.length;i++)for(let j=i+1;j<rr.length;j++)if(overlap(rr[i].ri,rr[i].rf,rr[j].ri,rr[j].rf))conf[a.id]=true;
    const bb=bloqueos.filter(b=>b.inventario_id===a.id);
    rr.forEach(r=>bb.forEach(b=>{if(overlap(r.ri,r.rf,b.inicio,b.fin))conf[a.id]=true;}));
  });
  const nConf=Object.keys(conf).length;
  const plazas=[...new Set(inv.map(a=>a.plazas?.nombre).filter(Boolean))];

async function vCampo(){

    </div>

      <h2>Nueva foto de evidencia</h2>

const ARTE_ESTADOS=["Borrador","Revisión interna","Aprobado interno","Enviado al cliente","Aprobado","Cambios solicitados"];
function arteColor(e){return {"Borrador":"#5C6577","Revisión interna":"#A36A0C","Aprobado interno":"#1E3A8A","Enviado al cliente":"#1E3A8A","Aprobado":"#1E3A8A","Cambios solicitados":"#C2402A"}[e]||"#5C6577";}

const esImg=u=>/\.(jpg|jpeg|png|webp|gif)$/i.test(u||"");
async function vArtes(){
  const camps=S.D.campAll.filter(c=>c.estado!=="Perdida"&&(c.campana_espacios||[]).length).sort((a,b)=>(b.inicio||"").localeCompare(a.inicio||""));
  if(!camps.length){shell(`<div class="head"><h1>Artes 🎨</h1></div><div class="panel"><div class="vacio">No hay campañas con espacios. Crea una campaña y agrégale espacios primero.</div></div>`);return;}
  if(!S.D.arteCamp||!camps.some(c=>c.id===S.D.arteCamp)) S.D.arteCamp=camps[0].id;
  const sel=camps.find(c=>c.id===S.D.arteCamp);
  const [{data:esp},{data:ar},{data:cli}]=await Promise.all([
    db.from("campana_espacios").select("id, inventario(nombre,tipo,plazas(nombre))").eq("campana_id",sel.id),
    db.from("artes").select("*").eq("campana_id",sel.id).order("version",{ascending:false}),
    S.D.cli?Promise.resolve({data:S.D.cli}):db.from("clientes").select("id,nombre")
  ]);
  S.D.cli=cli||S.D.cli;
  const espacios=esp||[], artes=ar||[];
  const cliNom=(S.D.cli||[]).find(c=>c.id===sel.cliente_id)?.nombre||"Sin cliente";
  const puedeAprob=esAdmin()||sel.vendedor_id===S.perfil.id;
  const ro=soloLectura();
  const opc=camps.map(c=>`<option value="${c.id}" ${c.id===S.D.arteCamp?'selected':''}>${esc(c.nombre)}</option>`).join("");
  const tarjetas=espacios.map(e=>{
    const versiones=artes.filter(a=>a.espacio_id===e.id).sort((a,b)=>b.version-a.version);
    const cur=versiones[0];
    let acciones="", cuerpo="";
    if(!cur){
      cuerpo=`<div class="vacio" style="text-align:left">Sin arte todavía.</div>`;
      acciones=ro?"":`<button class="btn sm" onclick="modalSubirArte('${sel.id}','${e.id}')">Subir arte</button>`;
    } else {
      const prev=esImg(cur.url)?`<img src="${esc(cur.url)}" style="width:100%;max-height:200px;object-fit:contain;background:#0e1a17;border-radius:8px"/>`:`<a class="btn-ghost" href="${esc(cur.url)}" target="_blank">📄 Ver archivo (${esc((cur.url.split('.').pop()||'').toUpperCase())})</a>`;
      cuerpo=`${prev}<div style="margin-top:6px">${arteBadge(cur.estado)} <span class="sub">v${cur.version}${cur.nombre?' · '+esc(cur.nombre):''}</span></div>${cur.nota?`<div class="sub" style="margin-top:4px">Nota: ${esc(cur.nota)}</div>`:''}${cur.estado==='Cambios solicitados'&&cur.comentario_cliente?`<div class="banner bad" style="margin-top:8px">Cliente pide cambios: ${esc(cur.comentario_cliente)}</div>`:''}${cur.estado==='Aprobado'?`<div class="banner ok" style="margin-top:8px">✓ Aprobado por el cliente</div>`:''}${cur.aprob_interno_por&&['Aprobado interno','Enviado al cliente','Aprobado'].includes(cur.estado)?`<div class="sub" style="margin-top:4px">V.B. interno: ${esc(cur.aprob_interno_por)}</div>`:''}`;
      if(!ro){
        const btns=[];
        if(cur.estado==='Borrador') btns.push(`<button class="btn sm" onclick="arteEstado('${cur.id}','Revisión interna')">Enviar a revisión</button>`);
        if(cur.estado==='Revisión interna'){ if(puedeAprob) btns.push(`<button class="btn sm" onclick="aprobarInterno('${cur.id}')">Aprobar (interno)</button>`); else btns.push(`<span class="sub">Espera V.B. de Dirección o del comercial responsable</span>`); btns.push(`<button class="btn-ghost" onclick="arteEstado('${cur.id}','Borrador')">Regresar</button>`);}
        if(cur.estado==='Aprobado interno') btns.push(`<button class="btn sm" onclick="arteEstado('${cur.id}','Enviado al cliente')">Enviar al cliente</button>`);
        if(cur.estado==='Enviado al cliente') btns.push(`<span class="sub">Esperando respuesta del cliente…</span>`);
        if(cur.estado==='Cambios solicitados'||cur.estado==='Aprobado') btns.push(`<button class="btn-ghost" onclick="modalSubirArte('${sel.id}','${e.id}')">Subir nueva versión</button>`);
        acciones=btns.join(" ");
      }
    }
    const hist=versiones.length>1?`<div class="sub" style="margin-top:8px">Versiones: ${versiones.map(v=>`<a href="${esc(v.url)}" target="_blank">v${v.version}</a>`).join(" · ")}</div>`:"";
    return `<div class="card"><h3 style="font-size:14px">${esc(e.inventario?.nombre||"Espacio")}</h3><div class="sub" style="margin-bottom:8px">${esc(e.inventario?.plazas?.nombre||"")}</div>${cuerpo}${hist}<div style="margin-top:auto;padding-top:10px;display:flex;gap:6px;flex-wrap:wrap">${acciones}</div></div>`;
  }).join("")||'<div class="vacio">Esta campaña no tiene espacios.</div>';
  shell(`<div class="head"><h1>Artes 🎨</h1></div>
    <div class="panel"><label class="sub">Campaña</label><select onchange="S.D.arteCamp=this.value;vArtes()">${opc}</select><div class="sub" style="margin-top:6px">${esc(cliNom)} · ${esc(sel.estado)} · ${espacios.length} espacios</div></div>
    <p class="sub" style="margin-bottom:12px">Flujo por espacio: Borrador → Revisión interna → <b>Aprobado interno</b> (Dirección o comercial responsable) → Enviado al cliente → Aprobado / Cambios solicitados.</p>
    <div class="cards">${tarjetas}</div>`);
}

/* --- Medición: afluencia e impresiones reales --- */
async function vMedicion(){
  const [{data:plz},{data:afl}]=await Promise.all([
    db.from("plazas").select("id,nombre").order("nombre"),
    db.from("afluencia").select("*").gte("fecha",addDias(hoy(),-60)).order("fecha",{ascending:false})
  ]);
  const vis=plazasVisibles();
  const plazas=(plz||[]).filter(p=>!vis||vis.includes(p.id));
  S.D.medPlz=plazas; S.D.afl=afl||[];
  if(!S.D.medSel||!plazas.some(p=>p.id===S.D.medSel)) S.D.medSel=plazas[0]?.id||null;
  const ro=soloLectura();
  const sel=S.D.medSel;
  const delMes=(afl||[]).filter(a=>a.plaza_id===sel&&a.fecha>=addDias(hoy(),-30));
  const totMes=delMes.reduce((s,a)=>s+Number(a.visitantes),0);
  const dias30=Math.max(1,new Set(delMes.map(a=>a.fecha)).size);
  const promDia=Math.round(totMes/dias30);
  const proyMes=Math.round(promDia*30.4);
  // mini gráfica últimos 14 días
  const ult14=[...Array(14)].map((_,i)=>{const f=addDias(hoy(),-(13-i));const v=(afl||[]).filter(a=>a.plaza_id===sel&&a.fecha===f).reduce((s,a)=>s+Number(a.visitantes),0);return {f,v};});
  const maxv=Math.max(1,...ult14.map(x=>x.v));
  const barras=ult14.map(x=>`<div title="${x.f}: ${fmtImp(x.v)}" style="flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center"><div style="width:70%;height:${Math.round(x.v/maxv*90)}px;background:var(--accent);border-radius:3px 3px 0 0;min-height:2px"></div><span style="font-size:9px;color:var(--muted);margin-top:3px">${x.f.slice(8)}</span></div>`).join("");
  // impresiones reales por activo de la plaza

async function aplicarImpresiones(plazaId){
  if(soloLectura())return;
  const delMes=(S.D.afl||[]).filter(a=>a.plaza_id===plazaId&&a.fecha>=addDias(hoy(),-30));
  if(!delMes.length){toast("No hay afluencia reciente de esta plaza");return;}
  const dias30=Math.max(1,new Set(delMes.map(a=>a.fecha)).size);
  const proyMes=Math.round(delMes.reduce((s,a)=>s+Number(a.visitantes),0)/dias30*30.4);
  const acts=(S.D.inv||[]).filter(a=>a.plaza_id===plazaId);
  if(!confirm(`Se actualizarán las impresiones/mes de ${acts.length} espacio(s) con base en ${fmtImp(proyMes)} visitantes/mes. ¿Continuar?`))return;
  for(const a of acts){const imp=Math.round(proyMes*Number(a.factor_visibilidad||100)/100);await db.from("inventario").update({impresiones_mes:imp}).eq("id",a.id);}
  S.D.campAll=null;await precargar();toast("Impresiones actualizadas en inventario");vMedicion();
}
window.aplicarImpresiones=aplicarImpresiones;
async function importarInventario(){
  if(soloLectura())return;
  const vis=plazasVisibles();
  const [{data:plz},{data:niv}]=await Promise.all([db.from("plazas").select("id,nombre").order("nombre"),db.from("niveles").select("id,nombre,plaza_id").order("orden")]);
  const plazas=(plz||[]).filter(p=>!vis||vis.includes(p.id));
  if(!plazas.length){toast("No tienes plazas en tu alcance");return;}
  const nivOpts=[{value:"",label:"— Sin nivel —"}].concat((niv||[]).map(n=>({value:n.id,label:((plazas.find(p=>p.id===n.plaza_id)?.nombre)||"")+" · "+n.nombre})));
  formModal({title:"Importar espacios al inventario",extra:`<p class="sub" style="margin-bottom:4px">Pega una línea por espacio con el formato <b>nombre, tipo, tarifa, impresiones</b>. Solo el nombre es obligatorio. Ejemplo:<br><span style="font-family:ui-monospace,monospace;font-size:11.5px">Valla entrada norte, Valla, 18000, 120000<br>Pantalla food court, Pantalla, 25000, 200000</span></p>`,fields:[
    {key:"plaza_id",label:"Plaza (para todos los espacios)",type:"select",options:plazas.map(p=>({value:p.id,label:p.nombre}))},
    {key:"nivel_id",label:"Nivel (opcional, para todos)",type:"select",options:nivOpts,value:""},
    {key:"datos",label:"Espacios (uno por línea)",type:"textarea"}
  ],saveLabel:"Importar",onSave:async v=>{
    if(!v.plaza_id||!v.datos){toast("Elige plaza y pega al menos una línea");return false;}
    const tipos=(typeof TIPOS_ACTIVO!=="undefined"?TIPOS_ACTIVO:[]);
    const filas=v.datos.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>{
      const p=l.split(/[,;\t]/).map(s=>s.trim());
      const nombre=p[0]||"";
      let tipo=p[1]||"";
      if(tipo){const m=tipos.find(t=>t.toLowerCase()===tipo.toLowerCase());tipo=m||tipo;} else tipo=tipos[0]||"Otro";
      const tarifa=Number((p[2]||"").replace(/[^0-9.]/g,""))||0;
      const impr=Number((p[3]||"").replace(/[^0-9.]/g,""))||0;
      return {plaza_id:v.plaza_id,nivel_id:v.nivel_id||null,nombre,tipo,tarifa,impresiones_mes:impr,activo:true};
    }).filter(x=>x.nombre);
    if(!filas.length){toast("No encontré líneas válidas");return false;}
    const {error}=await db.from("inventario").insert(filas);
    if(error){toast("No se pudo: "+error.message);return false;}
    toast(`Importados ${filas.length} espacios`);
    S.D.campAll=null;await precargar();vInventario();
  }});
}
window.importarInventario=importarInventario;

    ${abiertas.length?abiertas.map(tarjeta).join(""):'<div class="vacio">No hay solicitudes pendientes.</div>'}
    ${cerradas.length?`<h2 style="margin:16px 0 8px">Historial</h2>${cerradas.map(tarjeta).join("")}`:''}`);

async function convertirSolicitud(id){
  if(soloLectura())return;
  const {data:s}=await db.from("solicitudes").select("*, solicitud_items(*, paquetes(nombre))").eq("id",id).single();
  if(!s){toast("No se encontró la solicitud");return;}
  if(!confirm(`Crear una campaña (estado Propuesta) a partir de “${s.titulo||"solicitud"}”. Luego podrás cotizar precios. ¿Continuar?`))return;
  // cliente ligado a la organización de la marca
  let cliId=null;
  if(s.organizacion_id){const {data:cl}=await db.from("clientes").select("id").eq("organizacion_id",s.organizacion_id).limit(1).maybeSingle();cliId=cl?.id||null;}
  const paqNotas=(s.solicitud_items||[]).filter(it=>it.paquete_id).map(it=>it.paquetes?.nombre).filter(Boolean);
  const notas=[s.objetivo?`Objetivo: ${s.objetivo}`:"",s.presupuesto?`Presupuesto indicado: ${s.presupuesto}`:"",s.mensaje?`Nota de la marca: ${s.mensaje}`:"",paqNotas.length?`Paquetes solicitados: ${paqNotas.join(", ")}`:"","(Generada desde solicitud del portal de la marca.)"].filter(Boolean).join("\n");
  const {data:nc,error}=await db.from("campanas").insert({nombre:s.titulo||"Solicitud de marca",cliente_id:cliId,organizacion_id:s.organizacion_id,inicio:s.inicio||hoy(),fin:s.fin||addDias(hoy(),30),estado:"Propuesta",vendedor_id:S.perfil.id,notas}).select().single();
  if(error){toast("No se pudo crear la campaña: "+error.message);return;}
  const esp=(s.solicitud_items||[]).filter(it=>it.inventario_id).map(it=>({campana_id:nc.id,inventario_id:it.inventario_id,precio:0,inicio:s.inicio||null,fin:s.fin||null}));
  if(esp.length){const {error:e2}=await db.from("campana_espacios").insert(esp);if(e2)toast("Campaña creada; revisa los espacios: "+e2.message);}
  await db.from("solicitudes").update({estado:"Convertida",campana_id:nc.id}).eq("id",id);
  toast("Campaña creada. Cotiza los espacios.");S.campSel=nc.id;abrirCamp(nc.id);
}
window.convertirSolicitud=convertirSolicitud;

function puedeNiveles(){ return ["Dirección","Director divisional","Gerente regional","Gerente de plaza"].includes(S.perfil.rol); }
async function vInventario(){
  const {data:niveles}=await db.from("niveles").select("*").order("orden");
  S.D.niveles=niveles||[];
  const nivelNom=id=>{const n=(niveles||[]).find(x=>x.id===id);return n?n.nombre:"";};
  const plazas=[...new Set((S.D.inv||[]).map(a=>a.plazas?.nombre).filter(Boolean))];
  const di=S.D.dispIni||hoy(), df=S.D.dispFin||addDias(hoy(),30);
  const ocupadoEn=(a,i,f)=>{
    const r=S.D.campAll.some(c=>c.estado!=="Perdida"&&c.estado!=="Propuesta"&&(c.campana_espacios||[]).some(e=>e.inventario_id===a.id&&overlap(e.inicio||c.inicio,e.fin||c.fin,i,f)));
    const b=(S.D.bloqueos||[]).some(x=>x.inventario_id===a.id&&overlap(x.inicio,x.fin,i,f));
    return r||b;
  };
  const libres=(S.D.inv||[]).filter(a=>!ocupadoEn(a,di,df));
  const dispPanel=`<div class="panel"><div class="panel-head"><h2>Disponibilidad por fecha</h2><div style="display:flex;gap:8px;align-items:center"><input type="date" value="${di}" onchange="S.D.dispIni=this.value;vInventario()" style="width:auto"/><span class="sub">a</span><input type="date" value="${df}" onchange="S.D.dispFin=this.value;vInventario()" style="width:auto"/></div></div><p class="sub" style="margin-bottom:8px"><b>${libres.length}</b> de ${(S.D.inv||[]).length} activos libres en ese rango:</p><div>${libres.map(a=>`<span class="chip">${esc(a.plazas?.nombre||"")} · ${esc(a.nombre)}</span>`).join("")||'<span class="sub">Ninguno libre en ese rango.</span>'}</div></div>`;
  const ro=soloLectura();
  const secciones=plazas.map(p=>{
    const acts=S.D.inv.filter(a=>a.plazas?.nombre===p);
    const filas=acts.map(a=>{const sug=precioSugerido(a);const d=a.tarifa>0?Math.round((sug/a.tarifa-1)*100):0;const ocup=ocupadoEn(a,hoy(),hoy());const ficha=[a.medidas,a.material].filter(Boolean).join(" · ");const cv=cpm(a);return `<tr><td style="width:54px">${a.foto_url?`<img src="${esc(a.foto_url)}" style="width:46px;height:46px;object-fit:cover;border-radius:8px"/>`:`<div style="width:46px;height:46px;border-radius:8px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:18px">▦</div>`}</td><td><strong>${esc(a.nombre)}</strong>${a.es_digital?' <span class="badge">Digital</span>':''}${ficha?`<div class="sub">${esc(ficha)}</div>`:''}</td><td class="sub">${esc(nivelNom(a.nivel_id)||"—")}</td><td>${esc(a.tipo)}</td><td class="der num">${a.impresiones_mes>0?fmtImp(a.impresiones_mes):'<span class="sub">—</span>'}</td><td class="der num">${cv>0?mxn(cv):'<span class="sub">—</span>'}</td><td class="der num">${mxn(a.tarifa)}</td><td>${ocup?'<span class="badge">Ocupado</span>':'<span class="sub">Disponible</span>'}</td><td class="der">${ro?'':`<button class="btn-ghost" onclick="activoForm('${a.id}')">Editar</button><button class="btn-ghost rojo" onclick="borrar('inventario','${a.id}')">✕</button>`}</td></tr>`;}).join("");
    return `<div class="panel p0"><h2 style="padding:16px 16px 0">${esc(p)}</h2><table><thead><tr><th></th><th>Activo</th><th>Nivel</th><th>Tipo</th><th class="der">Impr./mes</th><th class="der">CPM</th><th class="der">Tarifa</th><th>Hoy</th><th></th></tr></thead><tbody>${filas}</tbody></table></div>`;}).join("")||'<div class="vacio">Aún no hay espacios en el inventario.'+(ro?'':' <button class="link" onclick="activoForm()">Agregar el primero</button>')+'</div>';
  shell(`<div class="head"><h1>Inventario</h1><div style="display:flex;gap:6px">${puedeNiveles()&&!ro?`<button class="btn-ghost" onclick="gestionarNiveles()">Plazas y niveles</button>`:''}${ro?'':'<button class="btn-ghost" onclick="importarInventario()">Importar</button><button class="btn" onclick="activoForm()">+ Activo</button>'}</div></div>${dispPanel}${secciones}`);
}
async function gestionarNiveles(){
  const vis=plazasVisibles();
  const [{data:plz},{data:niv},{data:invc}]=await Promise.all([
    db.from("plazas").select("id,nombre,ciudad").order("nombre"),
    db.from("niveles").select("*").order("orden"),
    db.from("inventario").select("id,plaza_id")
  ]);
  const plazas=(plz||[]).filter(p=>!vis||vis.includes(p.id));
  S.D.nivPlz=plazas;
  const nEsp=p=>(invc||[]).filter(x=>x.plaza_id===p.id).length;
  const cuerpo=plazas.map(p=>{const ns=(niv||[]).filter(n=>n.plaza_id===p.id).sort((a,b)=>a.orden-b.orden);const esp=nEsp(p);return `<div class="plz-card"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><b>${esc(p.nombre)}</b>${p.ciudad?` <span class="sub">${esc(p.ciudad)}</span>`:''}<div class="sub">${ns.length} nivel(es) · ${esp} espacio(s)</div></div><div style="display:flex;gap:4px;flex-shrink:0"><button class="btn-ghost" onclick="plazaFormNiveles('${p.id}')">editar</button><button class="btn-ghost rojo" onclick="borrarPlaza('${p.id}')" title="Eliminar plaza">✕</button></div></div><div style="margin-top:6px"><div style="display:flex;justify-content:space-between;align-items:center"><span class="sub">Niveles</span><button class="btn-ghost" onclick="nivelForm('${p.id}')">+ nivel</button></div>${ns.length?ns.map(n=>`<div style="display:flex;justify-content:space-between;align-items:center;margin:4px 0 4px 8px"><span>${esc(n.nombre)}${n.exterior?' <span class="badge">Exterior</span>':''}</span><span><button class="btn-ghost" onclick="nivelForm('${p.id}','${n.id}')">editar</button><button class="btn-ghost rojo" onclick="borrarNivel('${n.id}')">✕</button></span></div>`).join(""):'<div class="sub" style="margin-left:8px">Sin niveles. Agrega planta baja, pisos y un “Exterior” para fachadas.</div>'}</div></div>`;}).join("")||'<div class="vacio">No tienes plazas en tu alcance. Crea una con “+ Plaza”.</div>';
  const o=document.createElement("div");o.className="overlay";
  o.innerHTML=`<div class="modal"><div class="panel-head"><h3 style="margin:0">Plazas y niveles</h3><div style="display:flex;gap:6px">${soloLectura()?'':`<button class="btn sm" onclick="plazaFormNiveles()">+ Plaza</button>`}<button class="btn-ghost" data-x>Cerrar</button></div></div><p class="sub" style="margin:8px 0">Crea y administra tus plazas y los niveles de cada una (planta baja, pisos, exterior). No necesitas crear espacios para esto.</p><div style="max-height:62vh;overflow:auto">${cuerpo}</div></div>`;
  o.onclick=e=>{if(e.target===o)o.remove();};o.querySelector("[data-x]").onclick=()=>o.remove();
  document.body.appendChild(o);
}
window.gestionarNiveles=gestionarNiveles;

// Compresión de imágenes en el navegador (reduce peso antes de subir)
function comprimirImagen(file,max=1600,calidad=0.82){return new Promise((res,rej)=>{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{URL.revokeObjectURL(url);let{width:w,height:h}=img;if(w>max||h>max){if(w>=h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);cv.toBlob(b=>b?res(b):rej(new Error("no se pudo procesar")),"image/jpeg",calidad);};img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("imagen inválida"));};img.src=url;});}

/* --- Tarifas --- */
function vTarifas(){
  const m=S.D.tarifaMes!=null?S.D.tarifaMes:new Date().getMonth();
  const temporada=S.config.temporada||TEMPORADA_DEF;
  const plazas=[...new Set((S.D.inv||[]).map(a=>a.plazas?.nombre).filter(Boolean))];
  const secciones=plazas.map(p=>{const pid=(S.D.inv.find(a=>a.plazas?.nombre===p)||{}).plaza_id;const occ=Math.round(ocupacionPlaza(pid)*100);const filas=S.D.inv.filter(a=>a.plazas?.nombre===p).map(a=>{const sug=precioSugerido(a,m);const d=a.tarifa>0?Math.round((sug/a.tarifa-1)*100):0;return `<tr><td><strong>${esc(a.nombre)}</strong></td><td class="der num sub">${mxn(a.tarifa)}</td><td class="der num"><strong>${mxn(sug)}</strong></td><td class="der num" style="color:${d>0?'#1E3A8A':d<0?'#C2402A':'#5C6577'}">${d>0?'+':''}${d}%</td></tr>`;}).join("");return `<div class="panel"><div class="panel-head"><h2>${esc(p)}</h2><span class="sub">Ocupación ${occ}% · demanda ×${factorDemanda(pid).toFixed(2)} · ${MESES[m]} ×${factorTemporada(m).toFixed(2)}</span></div><table><thead><tr><th>Activo</th><th class="der">Lista</th><th class="der">Sugerida</th><th class="der">Var.</th></tr></thead><tbody>${filas}</tbody></table></div>`;}).join("");
  const editor=`<div class="panel"><h2>Índice de temporada por mes</h2><p class="sub" style="margin-bottom:10px">1.00 = normal. Sube meses de alta demanda, baja los flojos.</p><div class="temp-grid">${MESES.map((mm,i)=>`<div class="temp-cell"><span>${mm}</span><input type="number" step="0.05" value="${temporada[i]}" onchange="setTemporada(${i},this.value)"/></div>`).join("")}</div></div>`;
  // Simulador: ingreso potencial si se vendiera todo el inventario a precio sugerido
  const totalLista=(S.D.inv||[]).reduce((s,a)=>s+Number(a.tarifa||0),0);
  const factSim=S.D.simFactor!=null?S.D.simFactor:temporada[m];
  const totalSug=(S.D.inv||[]).reduce((s,a)=>s+Math.round((a.tarifa||0)*factSim*factorDemanda(a.plaza_id)/100)*100,0);
  const dif=totalLista>0?Math.round((totalSug/totalLista-1)*100):0;
  const volTxt=DESC_VOLUMEN.map(t=>`${t.min}+ espacios → −${t.pct}%`).join(" · ");
  const simulador=`<div class="panel"><h2>Simulador de ingresos</h2><p class="sub" style="margin-bottom:10px">¿Qué pasa con el ingreso potencial (todo el inventario vendido) si ajusto el factor de <b>${MESES[m]}</b>?</p>
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap"><label class="sub">Factor del mes</label><input type="number" step="0.05" value="${factSim}" style="width:100px" onchange="S.D.simFactor=Number(this.value);vTarifas()"/>
    <div class="kpi" style="margin:0"><div class="l">Ingreso potencial a lista</div><div class="v">${mxn(totalLista)}</div></div>
    <div class="kpi" style="margin:0"><div class="l">Con este factor</div><div class="v verde">${mxn(totalSug)} <span class="sub">${dif>0?'+':''}${dif}%</span></div></div></div>
    <p class="sub" style="margin-top:8px">Es una proyección de máximo potencial, no una venta asegurada.</p></div>
    <div class="panel"><h2>Descuentos por volumen</h2><p class="sub">Se aplican al cotizar una campaña con varios espacios: ${volTxt}.</p></div>`;

// Cálculo de puntos según plantilla de regla
function calcPuntos(regla,cantidad){if(!regla)return 0;cantidad=Number(cantidad||0);if(regla.tipo==="monto")return regla.unidad_monto>0?Math.floor(cantidad/regla.unidad_monto)*regla.puntos:0;if(regla.tipo==="unidades")return cantidad*regla.puntos;return regla.puntos;}
// Banderas de control automático para un registro
function flagsRegistro(r,reglas,regs){const f=[];const rg=(reglas||[]).find(x=>x.id===r.regla_id);if(!rg)return f;if(rg.requiere_folio){if(!r.folio)f.push("sin folio");else if((regs||[]).some(o=>o.id!==r.id&&o.folio&&o.folio===r.folio))f.push("folio duplicado");}if(rg.requiere_foto&&!r.foto_url)f.push("sin foto");const dia=(r.creado_en||"").slice(0,10);if(rg.tope_dia>0){const n=(regs||[]).filter(o=>o.inquilino_id===r.inquilino_id&&o.regla_id===r.regla_id&&o.estado==="Aprobado"&&(o.creado_en||"").slice(0,10)===dia).length;if(n>=rg.tope_dia)f.push("tope diario");}return f;}

/* --- Facturación global --- */
function vFacturacion(){
  const fact=S.D.campAll.flatMap(c=>(c.facturas||[]).map(f=>({...f,camp:c})));
  const facturado=fact.filter(f=>f.estado!=="Por emitir").reduce((s,f)=>s+Number(f.monto||0),0);
  const cobrado=fact.filter(f=>f.estado==="Pagada").reduce((s,f)=>s+Number(f.monto||0),0);
  const buckets=["Vigente","1-30 días","31-60 días","60+ días"];
  const bucket=f=>{if(f.estado==="Pagada"||f.estado==="Por emitir")return null;const d=dias(f.vencimiento,hoy());return d<=0?"Vigente":d<=30?"1-30 días":d<=60?"31-60 días":"60+ días";};
  const sumB=b=>fact.filter(f=>bucket(f)===b).reduce((s,f)=>s+Number(f.monto||0),0);
  const cliMap={};(S.D.cli||[]).forEach(c=>cliMap[c.id]=c.nombre);if(!S.D.cli)db.from("clientes").select("id,nombre").then(({data})=>{S.D.cli=data||[];vFacturacion();});
  const filas=fact.sort((a,b)=>(a.vencimiento||"").localeCompare(b.vencimiento||"")).map(f=>`<tr><td><strong>${esc(f.folio||"—")}</strong></td><td><button class="link" onclick="abrirCamp('${f.camp.id}')">${esc(f.camp.nombre)}</button><div class="sub">${esc(cliMap[f.camp.cliente_id]||"")}</div></td><td class="der num">${mxn(f.monto)}</td><td class="num">${fc(f.emision)}</td><td class="num">${fc(f.vencimiento)}</td><td><span class="badge">${esc(estadoFactura(f))}</span></td></tr>`).join("")||`<tr><td colspan="6" class="vacio">Sin facturas.</td></tr>`;
  const aging=buckets.map(b=>{const v=sumB(b);const max=Math.max(...buckets.map(sumB),1);return `<div style="flex:1;text-align:center"><div style="height:90px;display:flex;align-items:flex-end;background:#F2F4F6;border-radius:6px;overflow:hidden"><div style="width:100%;height:${v/max*100}%;background:${b==='60+ días'?'#C2402A':b==='31-60 días'?'#C2632A':b==='1-30 días'?'#C8901C':'#1E3A8A'}"></div></div><b class="num" style="font-family:Archivo">${milesK(v)}</b><div class="sub">${b}</div></div>`;}).join("");
  shell(`<div class="head"><h1>Facturación y cobranza</h1></div>
    <div class="kpis"><div class="kpi"><div class="l">Facturado</div><div class="v">${mxn(facturado)}</div></div><div class="kpi"><div class="l">Cobrado</div><div class="v verde">${mxn(cobrado)}</div></div><div class="kpi"><div class="l">Por cobrar</div><div class="v">${mxn(facturado-cobrado)}</div></div></div>
    <div class="panel"><h2>Antigüedad de saldos</h2><div style="display:flex;gap:18px;align-items:flex-end">${aging}</div></div>
    <div class="panel p0"><table><thead><tr><th>Folio</th><th>Campaña / cliente</th><th class="der">Monto</th><th>Emisión</th><th>Vence</th><th>Estado</th></tr></thead><tbody>${filas}</tbody></table></div>`);
}

  const n=S.D.campAll.filter(c=>c.vendedor_id===id).length;
  if(!destinos.length){toast("No hay otro vendedor activo para recibir las campañas.");return;}
  formModal({title:"Reasignar campañas",extra:`<p class="sub" style="margin-bottom:6px">Se moverán las <b>${n}</b> campaña(s) de este usuario al vendedor que elijas.</p>`,fields:[{key:"destino",label:"Nuevo vendedor",type:"select",options:destinos}],saveLabel:"Reasignar",onSave:async v=>{
    if(!v.destino)return false;
    const {error}=await db.from("campanas").update({vendedor_id:v.destino}).eq("vendedor_id",id);
    if(error){toast("No se pudo: "+error.message);return false;}
    toast("Campañas reasignadas");S.D.campAll=null;await precargar();vAdmin();
  }});
}
window.reasignarCampanas=reasignarCampanas;

async function guardarAviso(){
  const t=$("#cfgAviso").value;
  const {data:cur}=await db.from("aviso_privacidad").select("version").eq("id",1).single();
  const nv=(cur?.version||1)+1;
  const {error}=await db.from("aviso_privacidad").update({contenido:t,version:nv,actualizado_en:new Date().toISOString(),actualizado_por:S.perfil.id}).eq("id",1);

}

function invitarUsuario(tipo){
  if(tipo==="equipo"){
    formModal({title:"Invitar al equipo",extra:`<p class="sub" style="margin-bottom:4px">Alcance territorial: llena solo lo que aplique al rol. Vacío = ve todo.</p>`,fields:[
      {key:"email",label:"Correo",col:"g"},{key:"nombre",label:"Nombre",col:"g"},
      {key:"rol",label:"Rol",type:"select",options:ROLES_EQUIPO.map(r=>({value:r,label:r}))},
      ...camposTerritorio(null)
    ],saveLabel:"Crear invitación",onSave:async v=>{
      if(!v.email)return false;
      const {error}=await db.from("invitaciones").insert({email:v.email.trim(),nombre:v.nombre||"",rol:v.rol,organizacion_id:S.org.id,plaza_ids:v.plaza_ids.length?v.plaza_ids:null,region_ids:v.region_ids.length?v.region_ids:null,division_id:v.division_id||null,creada_por:S.perfil.id});
      if(error){toast("No se pudo: "+error.message);return false;}
      toast("Invitación creada para "+v.email);renderConsola();
    }});
  } else if(tipo==="inquilino"){
    db.from("inquilinos").select("id,nombre,plaza_id, plazas(nombre)").order("nombre").then(({data:inq})=>{
      const vis=plazasVisibles();
      const lista=(inq||[]).filter(t=>!vis||vis.includes(t.plaza_id));
      const opts=lista.map(t=>({value:t.id,label:t.nombre+(t.plazas?.nombre?` · ${t.plazas.nombre}`:"")}));
      formModal({title:"Invitar un inquilino (portal de lealtad)",extra:opts.length?"":`<p class="sub">No hay inquilinos en tus plazas. Créalos primero en Inquilinos.</p>`,fields:[
        {key:"email",label:"Correo del inquilino",col:"g"},{key:"nombre",label:"Nombre del contacto",col:"g"},
        {key:"inquilino_id",label:"Local / inquilino",type:"select",options:opts}
      ],saveLabel:"Crear invitación",onSave:async v=>{
        if(!v.email||!v.inquilino_id)return false;
        const {error}=await db.from("invitaciones").insert({email:v.email.trim(),nombre:v.nombre||"",rol:"Inquilino",organizacion_id:S.org.id,inquilino_id:v.inquilino_id,creada_por:S.perfil.id});
        if(error){toast("No se pudo: "+error.message);return false;}
        toast("Invitación creada para "+v.email);renderConsola();
      }});
    });
  } else {
    const cliOpts=(S.D.orgsCli||[]).map(o=>({value:o.id,label:o.nombre}));
    formModal({title:"Invitar una marca (portal)",extra:cliOpts.length?"":`<p class="sub">Aún no hay organizaciones-cliente. Crea una marca primero en Clientes.</p>`,fields:[
      {key:"email",label:"Correo del contacto"},{key:"nombre",label:"Nombre del contacto"},
      {key:"organizacion_id",label:"Marca / organización",type:"select",options:cliOpts}
    ],saveLabel:"Crear invitación",onSave:async v=>{
      if(!v.email||!v.organizacion_id)return false;
      const {error}=await db.from("invitaciones").insert({email:v.email.trim(),nombre:v.nombre||"",rol:"Cliente",organizacion_id:v.organizacion_id,creada_por:S.perfil.id});
      if(error){toast("No se pudo: "+error.message);return false;}
      toast("Invitación creada para "+v.email);renderConsola();
    }});
  }
}

function editarUsuario(id){
  db.from("perfiles").select("*").eq("id",id).single().then(({data:p})=>{
    const esCliente=p.rol==="Cliente";
    formModal({title:"Editar usuario",fields:[
      {key:"nombre",label:"Nombre",value:p.nombre},
      ...(esCliente?[]:[{key:"rol",label:"Rol",type:"select",options:ROLES_EQUIPO.map(r=>({value:r,label:r})),value:p.rol}]),
      ...(esCliente?[]:camposTerritorio(p))
    ],onSave:async v=>{
      const payload={nombre:v.nombre};
      if(!esCliente){payload.rol=v.rol;payload.plaza_ids=v.plaza_ids.length?v.plaza_ids:null;payload.region_ids=v.region_ids.length?v.region_ids:null;payload.division_id=v.division_id||null;}
      const {error}=await db.from("perfiles").update(payload).eq("id",id);
      if(error){toast("No se pudo: "+error.message);return false;}
      toast("Usuario actualizado");if(id===S.perfil.id){Object.assign(S.perfil,payload);}vAdmin();
    }});
  });
}

async function docProof(id){
  toast("Generando proof of performance…");
  const {data:c}=await db.from("campanas").select("*, clientes(nombre), campana_espacios(precio,inicio,fin, inventario(nombre,tipo,impresiones_mes,es_digital,plaza_id,plazas(nombre))), resultados(*), tareas_produccion(titulo,hecha), evidencias_foto(*)").eq("id",id).single();
  if(!c){toast("No se pudo cargar");return;}
  const ing=ingreso(c);
  const impr=(c.campana_espacios||[]).reduce((s,e)=>{const im=Number(e.inventario?.impresiones_mes||0);const dd=dias(e.inicio||c.inicio,e.fin||c.fin)||30;return s+im*(dd/30.4);},0);
  const cpmc=impr>0?ing/(impr/1000):0;
  const tareas=c.tareas_produccion||[]; const hechas=tareas.filter(t=>t.hecha).length; const pctProd=tareas.length?Math.round(hechas/tareas.length*100):100;
  const plazaIds=[...new Set((c.campana_espacios||[]).map(e=>e.inventario?.plaza_id).filter(Boolean))];
  // atribución afluencia
  let atrib=null;
  if(plazaIds.length){
    const flen=Math.max(1,dias(c.inicio,c.fin)); const baseIni=addDias(c.inicio,-flen), baseFin=addDias(c.inicio,-1); const finVent=c.fin<hoy()?c.fin:hoy();
    const {data:afl}=await db.from("afluencia").select("fecha,visitantes,plaza_id").in("plaza_id",plazaIds).gte("fecha",baseIni).lte("fecha",c.fin);
    const v=(i,f)=>{const xs=(afl||[]).filter(a=>a.fecha>=i&&a.fecha<=f);const dd=new Set(xs.map(a=>a.fecha)).size;return {prom:dd?xs.reduce((s,a)=>s+Number(a.visitantes),0)/dd:0,dias:dd};};
    const base=v(baseIni,baseFin), fl=v(c.inicio,finVent); const lift=base.dias&&fl.dias&&base.prom>0?Math.round((fl.prom/base.prom-1)*100):null;
    atrib={base,fl,lift};
  }
  let leal=0; if(c.cliente_id){const {data:rl}=await db.from("registros_lealtad").select("creado_en,estado,programas_lealtad(cliente_id)").eq("estado","Aprobado");leal=(rl||[]).filter(r=>r.programas_lealtad?.cliente_id===c.cliente_id&&r.creado_en>=c.inicio&&r.creado_en<=c.fin+"T23:59:59").length;}
  const {data:reps}=await db.from("reproducciones").select("reproducciones").eq("campana_id",id);
  const totalRep=(reps||[]).reduce((s,r)=>s+Number(r.reproducciones||0),0);
  const hayDigital=(c.campana_espacios||[]).some(e=>e.inventario?.es_digital);
  const fotos=(c.evidencias_foto||[]).slice(0,8);
  const espFilas=(c.campana_espacios||[]).map(e=>{const im=Number(e.inventario?.impresiones_mes||0);const dd=dias(e.inicio||c.inicio,e.fin||c.fin)||30;const x=Math.round(im*(dd/30.4));return `<tr><td>${esc(e.inventario?.nombre||"—")}</td><td>${esc(e.inventario?.plazas?.nombre||"")}</td><td class="der">${x>0?fmtImp(x):"—"}</td></tr>`;}).join("");

  const liftTxt=atrib&&atrib.lift!=null?`${atrib.lift>0?'+':''}${atrib.lift}%`:'—';

    <div class="marca">${esc(S.config.empresa)}</div><h1>Reporte de resultados</h1>

    <h2>Espacios entregados</h2><table><tr><th>Espacio</th><th>Plaza</th><th class="der">Impresiones</th></tr>${espFilas}</table>

    <h2>Impacto en el centro (atribución)</h2>
    <table><tr><th>Indicador</th><th class="der">Valor</th></tr>
      <tr><td>Afluencia promedio antes (visitantes/día)</td><td class="der">${atrib&&atrib.base.dias?fmtImp(Math.round(atrib.base.prom)):"—"}</td></tr>
      <tr><td>Afluencia promedio durante (visitantes/día)</td><td class="der">${atrib&&atrib.fl.dias?fmtImp(Math.round(atrib.fl.prom)):"—"}</td></tr>

      <tr><td>Actividad en programa de lealtad (registros)</td><td class="der">${fmtImp(leal)}</td></tr></table>
    <p class="sub" style="font-size:11px;color:#5C6577">Impresiones estimadas con base en aforo. El lift compara la afluencia del periodo de campaña contra un periodo previo equivalente; es un indicador direccional, no una relación causal exclusiva.</p>
    ${fotos.length?`<h2>Evidencias en sitio</h2><div style="display:flex;flex-wrap:wrap;gap:8px">${fotos.map(f=>`<img src="${esc(f.url)}" style="width:31%;height:120px;object-fit:cover;border-radius:8px"/>`).join("")}</div>`:''}
    <div class="pie">Generado el ${fc(hoy())} · ${esc(S.config.empresa)} · Reporte de resultados para ${esc(c.clientes?.nombre||"la marca")}</div>
  </body></html>`);

function ringSVG(p){const R=30,C=2*Math.PI*R;const col=p>=100?"#1E3A8A":p>=60?"#A36A0C":"#C2402A";return `<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="40" cy="40" r="${R}" fill="none" stroke="#E6ECEA" stroke-width="8"/><circle cx="40" cy="40" r="${R}" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C-C*Math.min(1,p/100)}" transform="rotate(-90 40 40)"/><text x="40" y="45" text-anchor="middle" font-size="17" font-weight="700" fill="#16213F">${p}%</text></svg>`;}
async function renderPortal(){
  root.innerHTML='<div class="cargando">Cargando tu portal…</div>';
  const [{data:camps},{data:inv},{data:fotos},{data:aceps},{data:msgs},{data:artes},{data:paqs},{data:sols}]=await Promise.all([
    db.from("campanas").select("*, campana_espacios(*, inventario(nombre,tipo,plazas(nombre))), facturas(*), resultados(*), tareas_produccion(titulo,hecha,evidencia)").order("inicio",{ascending:false}),
    db.from("inventario").select("*, plazas(nombre)").eq("activo",true),
    db.from("evidencias_foto").select("*").order("tomada_en",{ascending:false}),
    db.from("aceptaciones").select("*"),
    db.from("mensajes").select("*").order("creado_en",{ascending:true}),
    db.from("artes").select("*, campana_espacios(inventario(nombre,plazas(nombre)))").order("version",{ascending:false}),
    db.from("paquetes").select("id,nombre,objetivo,descripcion").order("nombre"),
    db.from("solicitudes").select("*, solicitud_items(inventario(nombre,plazas(nombre)), paquetes(nombre))").order("creada_en",{ascending:false})
  ]);
  S.D.pcamps=camps||[];S.D.pinv=inv||[];S.D.pfotos=fotos||[];S.D.paceps=aceps||[];S.D.pmsgs=msgs||[];S.D.partes=artes||[];S.D.ppaqs=paqs||[];S.D.psols=sols||[];pintarPortal();
}
function pintarPortal(){

  const res=camps.flatMap(c=>c.resultados||[]);
  const impactos=res.filter(r=>r.metrica.toLowerCase().includes("impact")).reduce((s,r)=>s+Number(r.real||0),0);
  const redenciones=res.filter(r=>r.metrica.toLowerCase().includes("redenci")).reduce((s,r)=>s+Number(r.real||0),0);
  const ticket=S.config.ticket_promedio||280;

  const PNAV=[["resumen","Resumen"],["campanas","Mis campañas"],["solicitar","Solicitar campaña"],["artes","Artes"],["resultados","Resultados"],["evidencias","Evidencias"],["mensajes","Mensajes"],["pagos","Estado de cuenta"],["explorar","Explorar más"]];

    cuerpo=`<div class="pcards"><div class="pcard dest"><div class="l">Valor estimado generado</div><div class="v">${mxn(redenciones*ticket)}</div><div class="sub" style="color:#B9C8EE">${redenciones.toLocaleString("es-MX")} redenciones × ${mxn(ticket)}</div></div><div class="pcard"><div class="l">Impactos</div><div class="v">${impactos.toLocaleString("es-MX")}</div></div><div class="pcard"><div class="l">Inversión vigente</div><div class="v">${mxn(ingVig)}</div></div><div class="pcard"><div class="l">Saldo pendiente</div><div class="v">${mxn(pend)}</div></div></div><h2 style="margin:6px 0 10px">Tus campañas en curso</h2>${lista}`;
  } else if(S.pvista==="campanas"){

  } else if(S.pvista==="mensajes"){

  } else if(S.pvista==="artes"){

        let estado="",acc="";
        if(a.estado==="Aprobado"){estado=`<span class="badge" style="background:#E6ECF8;color:#1E3A8A">✓ Aprobada por ti</span>`;}
        else if(a.estado==="Cambios solicitados"){estado=`<span class="badge" style="background:#FBE9E7;color:#C2402A">Cambios solicitados</span>`;acc=`<span class="sub">Tu equipo está trabajando en una nueva versión.</span>`;}
        else{estado=`<span class="badge">Para tu revisión</span>`;acc=`<button class="btn sm" onclick="clienteAprobarArte('${a.id}')">Aprobar</button> <button class="btn-ghost" onclick="clientePedirCambios('${a.id}')">Solicitar cambios</button>`;}
        return `<div class="panel"><div class="panel-head"><div><strong>${esc(nom)}</strong><div class="sub">${esc(plaza)} · versión ${a.version}</div></div>${estado}</div><div style="margin:8px 0">${prev}</div>${a.comentario_cliente?`<div class="sub" style="margin-bottom:6px">Tu comentario: “${esc(a.comentario_cliente)}”</div>`:''}<div style="display:flex;gap:8px;flex-wrap:wrap">${acc}</div></div>`;
      }).join("");

  } else if(S.pvista==="solicitar"){

    const lista=sols.length?sols.map(s=>{
      const items=(s.solicitud_items||[]);
      const chips=items.map(it=>it.inventario?`<span class="chip">${esc(it.inventario.nombre)} · ${esc(it.inventario.plazas?.nombre||"")}</span>`:it.paquetes?`<span class="chip">📦 ${esc(it.paquetes.nombre)}</span>`:"").join("");
      return `<div class="panel"><div class="panel-head"><div><strong>${esc(s.titulo||"Solicitud")}</strong> <span class="badge" style="${estadoColor(s.estado)}">${esc(s.estado)}</span><div class="sub">${s.inicio?("Del "+fc(s.inicio)+" al "+fc(s.fin)):"Sin fechas"} · enviada ${fc(s.creada_en)}</div></div></div>${s.objetivo?`<div class="sub" style="margin:6px 0">${esc(s.objetivo)}</div>`:''}<div>${chips||'<span class="sub">Sin espacios indicados</span>'}</div>${s.estado==="Convertida"?'<div class="sub" style="margin-top:8px;color:#1E3A8A">✓ Tu equipo de cuenta ya la está cotizando. La verás en “Mis campañas”.</div>':''}</div>`;
    }).join(""):'<div class="vacio">Aún no has enviado solicitudes.</div>';
    cuerpo=`<div class="panel"><div class="panel-head"><div><h2 style="margin:0">Arma tu campaña</h2><p class="sub" style="margin-top:4px">Elige los espacios y paquetes que te interesan y cuéntanos tu objetivo. Tu equipo de cuenta la cotiza y te la confirma — sin compromiso.</p></div><button class="btn" onclick="solicitudCampanaForm()">+ Nueva solicitud</button></div></div>${lista}`;

    const {data:sol,error}=await db.from("solicitudes").insert({organizacion_id:S.org.id,titulo:v.titulo,objetivo:v.objetivo||"",inicio:v.inicio||null,fin:v.fin||null,presupuesto:v.presupuesto||"",mensaje:v.mensaje||"",estado:"Nueva",creada_por:S.perfil.id}).select().single();
    if(error){toast("No se pudo: "+error.message);return false;}
    const items=[...(v.espacios||[]).map(id=>({solicitud_id:sol.id,inventario_id:id})),...(v.paquetes||[]).map(id=>({solicitud_id:sol.id,paquete_id:id}))];
    if(items.length){const {error:e2}=await db.from("solicitud_items").insert(items);if(e2){toast("Solicitud creada, pero falló el detalle: "+e2.message);}}
    try{await db.from("notificaciones").insert({organizacion_id:S.org.id,tipo:"solicitud",titulo:"Nueva solicitud de campaña",cuerpo:`${S.org.nombre} solicitó "${v.titulo}".`});}catch(e){}
    toast("¡Solicitud enviada! Tu equipo de cuenta te contactará.");S.pvista="solicitar";renderPortal();
  }});
}
window.solicitudCampanaForm=solicitudCampanaForm;

  formModal({title:"Aceptar propuesta",extra:`<p class="sub" style="margin-bottom:6px">Al aceptar, confirmas la propuesta de la campaña <b>${esc(c?.nombre||"")}</b>. Tu nombre queda registrado como firma.</p>`,fields:[{key:"firmante",label:"Tu nombre completo",value:S.perfil?.nombre||""},{key:"rol",label:"Cargo (opcional)"}],saveLabel:"Aceptar y firmar",onSave:async v=>{
    if(!v.firmante)return false;

    try{await db.from("notificaciones").insert({organizacion_id:S.org.id,tipo:"aceptacion",titulo:"Propuesta aceptada",cuerpo:`${S.org.nombre} aceptó "${c?.nombre||""}".`});}catch(e){}
    toast("¡Propuesta aceptada! Gracias."); renderPortal();
  }});
}
window.aceptarCampana=aceptarCampana;
async function enviarMensajePortal(cid){
  const inp=$("#pmsgTxt"); const txt=(inp?.value||"").trim(); if(!txt||!cid)return;

  const {data:msgs}=await db.from("mensajes").select("*").order("creado_en",{ascending:true}); S.D.pmsgs=msgs||[]; pintarPortal();
}
window.enviarMensajePortal=enviarMensajePortal;

window.clienteAprobarArte=clienteAprobarArte;

/* ===== Portal del inquilino (lealtad) ===== */
async function renderInquilino(){
  root.innerHTML='<div class="cargando">Cargando tu programa de lealtad…</div>';
  const [{data:progs},{data:reglas},{data:premios},{data:regs},{data:canjes},{data:miInq}]=await Promise.all([
    db.from("programas_lealtad").select("*, clientes(nombre)").order("creado_en",{ascending:false}),
    db.from("reglas_acumulacion").select("*"),
    db.from("premios_lealtad").select("*"),
    db.from("registros_lealtad").select("*").order("creado_en",{ascending:false}),
    db.from("canjes_lealtad").select("*, premios_lealtad(nombre)").order("creado_en",{ascending:false}),
    db.from("inquilinos").select("nombre, plazas(nombre)").eq("id",S.perfil.inquilino_id).maybeSingle()
  ]);
  S.D.iProgs=progs||[];S.D.iReglas=reglas||[];S.D.iPremios=premios||[];S.D.iRegs=regs||[];S.D.iCanjes=canjes||[];S.D.iInq=miInq||null;
  if(!S.D.iProg||!(progs||[]).some(p=>p.id===S.D.iProg)) S.D.iProg=(progs||[])[0]?.id||null;
  pintarInquilino();
}
function saldoPrograma(pid){
  const g=(S.D.iRegs||[]).filter(r=>r.programa_id===pid&&r.estado==="Aprobado").reduce((s,r)=>s+Number(r.puntos),0);
  const c=(S.D.iCanjes||[]).filter(x=>x.programa_id===pid&&x.estado!=="Cancelado").reduce((s,x)=>s+Number(x.costo_puntos),0);
  return g-c;
}
function pintarInquilino(){
  const nom=S.D.iInq?.nombre||S.perfil.nombre, plaza=S.D.iInq?.plazas?.nombre||"";
  const progs=S.D.iProgs||[];
  const prog=progs.find(p=>p.id===S.D.iProg);
  const tab=S.D.iTab||"registrar";
  let cuerpo="";
  if(!progs.length){
    cuerpo='<div class="vacio">Todavía no hay un programa de lealtad activo para tu local. Tu administrador del centro te avisará.</div>';
  } else if(prog){
    const reglas=(S.D.iReglas||[]).filter(r=>r.programa_id===prog.id&&r.activa);
    const premios=(S.D.iPremios||[]).filter(p=>p.programa_id===prog.id&&p.activo);
    const regs=(S.D.iRegs||[]).filter(r=>r.programa_id===prog.id);
    const canjes=(S.D.iCanjes||[]).filter(c=>c.programa_id===prog.id);
    const saldo=saldoPrograma(prog.id);
    const TI=(k,l)=>`<button class="${tab===k?'on':''}" onclick="S.D.iTab='${k}';pintarInquilino()">${l}</button>`;
    let c="";
    if(tab==="registrar"){
      c=reglas.length?reglas.map(r=>`<div class="panel"><div class="panel-head"><div><strong>${esc(r.descripcion||TIPO_REGLA[r.tipo])}</strong><div class="sub">${r.tipo==="monto"?`${r.puntos} pts por cada ${mxn(r.unidad_monto)}`:r.tipo==="unidades"?`${r.puntos} pts por unidad`:`${r.puntos} pts`}${r.requiere_folio?" · pide folio":""}${r.requiere_foto?" · pide foto":""}</div></div><button class="btn" onclick="registrarInquilino('${r.id}')">Registrar</button></div></div>`).join(""):'<div class="vacio">Este programa aún no tiene formas de ganar puntos.</div>';
    } else if(tab==="registros"){
      c=regs.length?regs.map(r=>{const col=r.estado==="Aprobado"?"#1E3A8A":r.estado==="Rechazado"?"#C2402A":"#A36A0C";return `<div class="panel"><div style="display:flex;justify-content:space-between"><div><strong>${fc(r.creado_en)}</strong>${r.folio?` · folio ${esc(r.folio)}`:''}<div class="sub">${r.cantidad?(((S.D.iReglas||[]).find(x=>x.id===r.regla_id)?.tipo==="monto")?mxn(r.cantidad):r.cantidad+" u"):""}</div>${r.motivo_rechazo?`<div class="sub">Motivo: ${esc(r.motivo_rechazo)}</div>`:''}</div><div style="text-align:right"><span class="badge" style="background:${col}1a;color:${col}">${esc(r.estado)}</span><div class="num" style="margin-top:4px">${Number(r.puntos).toLocaleString("es-MX")} pts</div></div></div></div>`;}).join(""):'<div class="vacio">Aún no has registrado nada.</div>';
    } else if(tab==="premios"){
      c=premios.length?premios.map(p=>{const alcanza=saldo>=p.costo_puntos&&(p.stock==null||p.stock>0);return `<div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><div><strong>${esc(p.nombre)}</strong><div class="sub">${esc(p.descripcion||"")}${p.stock!=null?` · ${p.stock} disp.`:""}</div></div><div style="text-align:right"><div class="num"><b>${Number(p.costo_puntos).toLocaleString("es-MX")} pts</b></div><button class="btn sm" ${alcanza?'':'disabled'} onclick="canjearPremio('${p.id}')" style="margin-top:4px">${p.stock!=null&&p.stock<=0?'Agotado':alcanza?'Canjear':'Te faltan puntos'}</button></div></div></div>`;}).join(""):'<div class="vacio">Sin premios disponibles.</div>';
    } else if(tab==="canjes"){
      c=canjes.length?canjes.map(x=>{const col=x.estado==="Entregado"?"#1E3A8A":x.estado==="Cancelado"?"#C2402A":"#A36A0C";return `<div class="panel"><div style="display:flex;justify-content:space-between"><div><strong>${esc(x.premios_lealtad?.nombre||"Premio")}</strong><div class="sub">${fc(x.creado_en)}</div></div><div style="text-align:right"><span class="badge" style="background:${col}1a;color:${col}">${esc(x.estado)}</span><div class="num" style="margin-top:4px">${Number(x.costo_puntos).toLocaleString("es-MX")} pts</div></div></div></div>`;}).join(""):'<div class="vacio">No has canjeado premios todavía.</div>';
    }
    const selector=progs.length>1?`<select onchange="S.D.iProg=this.value;S.D.iTab='registrar';pintarInquilino()" style="width:auto;margin-bottom:10px">${progs.map(p=>`<option value="${p.id}" ${p.id===prog.id?'selected':''}>${esc(p.nombre)}</option>`).join("")}</select>`:"";
    cuerpo=`${selector}
      <div class="pcard dest" style="margin-bottom:14px"><div class="l">Tus puntos · ${esc(prog.nombre)}</div><div class="v">${saldo.toLocaleString("es-MX")}</div><div class="sub" style="color:#B9C8EE">${esc(prog.clientes?.nombre||"")}</div></div>
      <div class="pnav">${TI("registrar","Registrar")}${TI("registros","Mis registros")}${TI("premios","Premios")}${TI("canjes","Mis canjes")}</div>
      ${c}`;
  }
  root.innerHTML=`<div class="portal"><header class="phead"><div class="pbrand"><span class="pini">${esc((nom||"·").slice(0,2).toUpperCase())}</span><div><b>${esc(nom)}</b><span>${esc(plaza)} · Programa de lealtad</span></div></div><button class="btn-ghost" onclick="salir()">Salir</button></header><main class="pmain">${cuerpo}</main></div>`;
}
function registrarInquilino(reglaId){
  const r=(S.D.iReglas||[]).find(x=>x.id===reglaId); if(!r)return;
  const campos=[];
  if(r.tipo==="monto"||r.tipo==="unidades") campos.push({key:"cantidad",label:r.tipo==="monto"?"Monto de la venta (MXN)":"Unidades vendidas",type:"number",value:0});
  if(r.requiere_folio) campos.push({key:"folio",label:"Folio / número de ticket"});
  const o=document.createElement("div");o.className="overlay";
  o.innerHTML=`<div class="modal"><h3>${esc(r.descripcion||TIPO_REGLA[r.tipo])}</h3>
    <div id="riCampos"></div>
    ${r.requiere_foto?'<label>Foto de evidencia (obligatoria)</label><input type="file" id="riFoto" accept="image/*" capture="environment"/>':''}
    <div id="riEst" class="sub" style="margin-top:8px">Otorga ${r.tipo==='accion'||r.tipo==='foto'?r.puntos+' pts':'puntos según lo que captures'}.</div>
    <div class="pie"><button class="btn-ghost" data-x>Cancelar</button><button class="btn" id="riSave">Enviar a validación</button></div></div>`;
  o.onclick=e=>{if(e.target===o)o.remove();};
  o.querySelector("[data-x]").onclick=()=>o.remove();
  // construir campos
  const cont=o.querySelector("#riCampos");
  campos.forEach(f=>{const w=document.createElement("div");w.innerHTML=`<label>${esc(f.label)}</label><input id="ri_${f.key}" type="${f.type==='number'?'number':'text'}" value="${f.value??''}"/>`;cont.appendChild(w);});
  o.querySelector("#riSave").onclick=async()=>{
    const btn=o.querySelector("#riSave");btn.disabled=true;btn.textContent="Enviando…";
    try{
      const cantidad=campos.some(f=>f.key==="cantidad")?Number(o.querySelector("#ri_cantidad")?.value||0):0;
      const folio=r.requiere_folio?(o.querySelector("#ri_folio")?.value||"").trim():"";
      if(r.requiere_folio&&!folio){toast("El folio es obligatorio");btn.disabled=false;btn.textContent="Enviar a validación";return;}
      let foto_url="",foto_path="";
      const ff=o.querySelector("#riFoto");
      if(r.requiere_foto){
        if(!ff||!ff.files[0]){toast("La foto es obligatoria");btn.disabled=false;btn.textContent="Enviar a validación";return;}
        let blob=ff.files[0];try{blob=await comprimirImagen(blob,1600,0.8);}catch(_){}
        const path=`lealtad/${S.perfil.inquilino_id}/${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
        const {error:up}=await db.storage.from("evidencias").upload(path,blob,{contentType:"image/jpeg"});
        if(up)throw up;
        foto_url=db.storage.from("evidencias").getPublicUrl(path).data.publicUrl;foto_path=path;
      }
      const puntos=calcPuntos(r,cantidad);
      const {error}=await db.from("registros_lealtad").insert({programa_id:r.programa_id,regla_id:r.id,inquilino_id:S.perfil.inquilino_id,plaza_id:S.D.iInq?null:null,cantidad,folio,foto_url,foto_path,puntos,estado:"Pendiente",creado_por:S.perfil.id});
      if(error)throw error;
      o.remove();toast("¡Enviado! Queda pendiente de validación.");renderInquilino();
    }catch(e){toast("No se pudo: "+e.message);btn.disabled=false;btn.textContent="Enviar a validación";}
  };
  document.body.appendChild(o);
}
window.registrarInquilino=registrarInquilino;
async function canjearPremio(premioId){
  const p=(S.D.iPremios||[]).find(x=>x.id===premioId); if(!p)return;
  if(saldoPrograma(p.programa_id)<p.costo_puntos){toast("Te faltan puntos");return;}
  if(!confirm(`¿Canjear "${p.nombre}" por ${p.costo_puntos} puntos? Tu equipo del centro coordinará la entrega.`))return;
  const {error}=await db.from("canjes_lealtad").insert({programa_id:p.programa_id,premio_id:p.id,inquilino_id:S.perfil.inquilino_id,costo_puntos:p.costo_puntos,estado:"Solicitado",creado_por:S.perfil.id});
  if(error){toast("No se pudo: "+error.message);return;}
  toast("¡Canje solicitado! Te avisarán para la entrega.");S.D.iTab="canjes";renderInquilino();
}
window.canjearPremio=canjearPremio;

init();
</script>
